<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>ХОККЕЙ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;touch-action:none;background:#080810;font-family:'Arial',sans-serif;}
canvas{display:block;}

/* ══ NOISE OVERLAY ══ */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size:200px 200px;opacity:0.35;
}

/* ══ МЕНЮ ══ */
#screen-menu{
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:200;
  background:radial-gradient(ellipse at 50% 30%, #1a0a2e 0%, #080810 60%);
}

/* Верхняя панель */
#top-bar{
  position:absolute;top:0;left:0;right:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:2.5vw 3vw;
}
#profile-pill{
  display:flex;align-items:center;gap:1.8vw;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
  border-radius:10vw;padding:1.2vw 2.5vw;cursor:pointer;
  transition:background 0.15s;
}
#profile-pill:active{background:rgba(255,255,255,0.12);}
#rank-icon-wrap{width:7vw;height:7vw;flex-shrink:0;}
#rank-icon-wrap canvas{width:100%;height:100%;}
#profile-info{display:flex;flex-direction:column;gap:0.3vw;}
#pill-nick{font-size:3vw;font-weight:700;color:#fff;}
#pill-elo{font-size:2.3vw;color:#aab0c0;}

#top-right-btns{display:flex;gap:2vw;}
.top-icon-btn{
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
  border-radius:1.5vw;padding:1.5vw 2vw;cursor:pointer;
  font-size:3vw;color:#ccc;
  transition:background 0.15s;display:flex;align-items:center;gap:1vw;
}
.top-icon-btn:active{background:rgba(255,255,255,0.14);}
.top-icon-btn span{font-size:2.2vw;color:#888;}

/* Центральный логотип */
#logo-area{
  display:flex;flex-direction:column;align-items:center;gap:1vw;
  margin-bottom:1vw;
}
#logo-title{
  font-size:8vw;font-weight:900;letter-spacing:0.12em;
  background:linear-gradient(135deg,#fff 0%,#aac4ff 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-transform:uppercase;
}
#logo-sub{font-size:2.2vw;color:#555;letter-spacing:0.3em;text-transform:uppercase;}

/* Персонаж */
#char-area{position:relative;display:flex;align-items:center;gap:3vw;margin:1vw 0;}
.char-arrow{
  background:none;border:2px solid rgba(255,255,255,0.15);border-radius:50%;
  width:9vw;height:9vw;color:#fff;font-size:4vw;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.12s,border-color 0.12s;flex-shrink:0;
}
.char-arrow:active{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.4);}
#char-img{
  width:22vw;max-width:160px;
  filter:drop-shadow(0 0 12px rgba(100,150,255,0.4));
  animation:charBob 2.5s ease-in-out infinite;
}
@keyframes charBob{0%,100%{transform:translateY(0);}50%{transform:translateY(-5%);}}

/* Кнопки игры */
#play-btns{display:flex;flex-direction:column;gap:2vw;width:60vw;max-width:380px;}
#btn-online{
  background:linear-gradient(135deg,#1a6fff,#00b4ff);
  color:#fff;border:none;border-radius:2vw;
  padding:2.8vw 0;font-size:4.2vw;font-weight:800;
  cursor:pointer;text-align:center;
  box-shadow:0 0.5vw 3vw rgba(0,120,255,0.5);
  transition:transform 0.1s,filter 0.1s;letter-spacing:0.05em;
}
#btn-online:active{filter:brightness(0.85);transform:scale(0.97);}
#btn-bot{
  background:rgba(255,255,255,0.06);
  color:#ddd;border:1px solid rgba(255,255,255,0.15);border-radius:2vw;
  padding:2.2vw 0;font-size:3.5vw;font-weight:600;
  cursor:pointer;text-align:center;
  transition:background 0.12s,transform 0.1s;
}
#btn-bot:active{background:rgba(255,255,255,0.12);transform:scale(0.97);}

/* Нижние кнопки */
#bottom-bar{
  position:absolute;bottom:0;left:0;right:0;
  display:flex;align-items:center;justify-content:center;
  padding:2vw 3vw;gap:3vw;
}
.btm-btn{
  background:none;border:1px solid rgba(255,255,255,0.12);border-radius:1.2vw;
  color:#666;font-size:2.5vw;padding:1.5vw 3.5vw;cursor:pointer;
  transition:color 0.12s,border-color 0.12s;
}
.btm-btn:active{color:#aaa;border-color:rgba(255,255,255,0.3);}

/* ══ МОДАЛКИ ══ */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.82);
  z-index:500;display:none;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);
}
.modal-overlay.open{display:flex;}
.modal-box{
  background:#10101e;border:1px solid rgba(255,255,255,0.1);
  border-radius:2.5vw;padding:4vw 5vw;
  min-width:55vw;max-width:88vw;color:#fff;
  animation:mPop 0.18s ease;position:relative;
}
@keyframes mPop{from{transform:scale(0.88);opacity:0;}to{transform:scale(1);opacity:1;}}
.modal-title{font-size:4vw;font-weight:700;margin-bottom:3vw;text-align:center;color:#c8d6ff;}
.modal-close{
  position:absolute;top:2vw;right:3vw;background:none;border:none;
  color:#555;font-size:5vw;cursor:pointer;line-height:1;
}
.modal-close:active{color:#aaa;}
.modal-row{
  display:flex;align-items:center;gap:2vw;margin-bottom:2.5vw;font-size:3vw;
}
.modal-row label{flex:1;color:#888;}
.modal-row input,.modal-row select{
  flex:1.5;background:#1e1e32;color:#fff;
  border:1px solid rgba(255,255,255,0.15);
  border-radius:1vw;padding:1.2vw 2vw;font-size:3vw;
}
.modal-btn{
  background:#1a6fff;color:#fff;border:none;
  border-radius:1.5vw;padding:1.8vw 4vw;
  font-size:3.2vw;cursor:pointer;width:100%;font-weight:700;
  transition:filter 0.1s;margin-top:1vw;
}
.modal-btn:active{filter:brightness(0.85);}
.top-row{
  display:flex;align-items:center;gap:2vw;padding:1.5vw 0;
  border-bottom:1px solid rgba(255,255,255,0.06);font-size:2.8vw;
}
.top-rank{font-size:3.2vw;min-width:5vw;text-align:center;}
.top-nick{flex:1;font-weight:700;}
.top-elo{color:#6699ff;font-weight:700;}

/* Ранг в профиле */
.rank-display{display:flex;align-items:center;gap:2vw;}
.rank-display canvas{width:8vw;height:8vw;}

/* ══ МАТЧМЕЙКИНГ ══ */
#screen-mm{
  position:fixed;inset:0;background:rgba(5,5,20,0.97);
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:400;color:#fff;
}
.mm-title{font-size:5.5vw;font-weight:800;color:#c8d6ff;margin-bottom:2vw;}
.mm-sub{font-size:3.2vw;color:#555;margin-bottom:5vw;}
.mm-spinner{
  width:11vw;height:11vw;margin-bottom:5vw;
  border:0.9vw solid rgba(255,255,255,0.08);
  border-top:0.9vw solid #1a6fff;
  border-radius:50%;animation:spin 0.85s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.mm-cancel{
  background:rgba(200,40,40,0.8);color:#fff;border:none;
  border-radius:2vw;padding:2vw 7vw;font-size:3.5vw;font-weight:700;
  cursor:pointer;
}
.mm-cancel:active{filter:brightness(0.8);}

/* ══ МАТЧ НАЙДЕН ══ */
#screen-found{
  position:fixed;inset:0;background:rgba(5,5,20,0.97);
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:450;color:#fff;animation:fadeIn 0.3s;
}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
#found-vs{font-size:7vw;font-weight:900;color:#c8d6ff;margin-bottom:3vw;letter-spacing:0.1em;}
#found-names{font-size:4vw;display:flex;gap:4vw;align-items:center;}
.found-red{color:#ff5555;font-weight:700;}
.found-blue{color:#5599ff;font-weight:700;}
.found-sep{color:#444;}

/* ══ ПОБЕДА ══ */
#screen-win{
  position:fixed;inset:0;background:rgba(5,5,20,0.96);
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:300;
}
@keyframes springIn{
  0%{transform:scale(0) rotate(-15deg);opacity:0;}
  45%{transform:scale(1.3) rotate(5deg);opacity:1;}
  70%{transform:scale(0.9) rotate(-3deg);}
  85%{transform:scale(1.08) rotate(1deg);}
  100%{transform:scale(1) rotate(0);}
}
#win-img{max-width:80vw;max-height:45vh;object-fit:contain;margin-bottom:2vw;}
#win-img.spring{animation:springIn 0.7s cubic-bezier(0.34,1.56,0.64,1) forwards;}
#win-text{display:none;}
.btn{
  background:rgba(26,111,255,0.9);color:#fff;border:none;
  border-radius:2.5vw;padding:2vw 7vw;font-size:3.8vw;cursor:pointer;
  margin:1.5vw;font-weight:700;transition:filter 0.1s;
}
.btn:active{filter:brightness(0.85);}
</style>
</head>
<body>

<!-- ═══ МЕНЮ ═══ -->
<div id="screen-menu">
  <!-- Верх -->
  <div id="top-bar">
    <div id="profile-pill" onclick="openModal('modal-profile')">
      <div id="rank-icon-wrap"><canvas id="rank-canvas" width="64" height="64"></canvas></div>
      <div id="profile-info">
        <div id="pill-nick">Лозер</div>
        <div id="pill-elo">ELO: 1640</div>
      </div>
    </div>
    <div id="top-right-btns">
      <button class="top-icon-btn" onclick="openModal('modal-tops')">🏆 <span>ТОПЫ</span></button>
      <button class="top-icon-btn" onclick="openModal('modal-settings')">⚙️ <span>НАСТРОЙКИ</span></button>
    </div>
  </div>

  <!-- Логотип -->
  <div id="logo-area">
    <div id="logo-title">🏒 ХОККЕЙ</div>
    <div id="logo-sub">Multiplayer</div>
  </div>

  <!-- Персонаж + стрелки -->
  <div id="char-area">
    <button class="char-arrow" onclick="prevChar()">◀</button>
    <img id="char-img" src="haha.png" alt="">
    <button class="char-arrow" onclick="nextChar()">▶</button>
  </div>

  <!-- Кнопки -->
  <div id="play-btns">
    <button id="btn-online" onclick="joinOnline()">🌐 ОНЛАЙН</button>
    <button id="btn-bot"    onclick="startGame(null)">🤖 С ботом (ELO)</button>
  </div>

  <!-- Низ -->
  <div id="bottom-bar">
    <button class="btm-btn" onclick="openModal('modal-nick')">✏️ Ник</button>
    <button class="btm-btn" onclick="openModal('modal-code')">👨‍💻 Автор</button>
  </div>
</div>

<!-- ═══ МОДАЛКА: НИК ═══ -->
<div class="modal-overlay" id="modal-nick">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('modal-nick')">✕</button>
    <div class="modal-title">Изменить ник</div>
    <div class="modal-row">
      <label>Ник:</label>
      <input type="text" id="input-nick" placeholder="Введи ник" maxlength="16">
    </div>
    <button class="modal-btn" onclick="saveNick()">💾 Сохранить</button>
  </div>
</div>

<!-- ═══ МОДАЛКА: ПРОФИЛЬ ═══ -->
<div class="modal-overlay" id="modal-profile">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('modal-profile')">✕</button>
    <div class="modal-title">Профиль</div>
    <div class="modal-row"><label>Ник:</label><span id="prof-nick">—</span></div>
    <div class="modal-row">
      <label>Ранг:</label>
      <div class="rank-display">
        <canvas id="rank-canvas-big" width="64" height="64"></canvas>
        <span id="prof-rank-name" style="font-size:3vw;color:#c8d6ff;"></span>
      </div>
    </div>
    <div class="modal-row"><label>ELO:</label><span id="prof-elo" style="color:#6699ff;font-weight:700;"></span></div>
    <div class="modal-row"><label>Побед:</label><span id="prof-wins"></span></div>
    <div class="modal-row"><label>Поражений:</label><span id="prof-losses"></span></div>
    <div class="modal-row"><label>Голов:</label><span id="prof-goals"></span></div>
  </div>
</div>

<!-- ═══ МОДАЛКА: ТОПЫ ═══ -->
<div class="modal-overlay" id="modal-tops">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('modal-tops')">✕</button>
    <div class="modal-title">🏆 Топ игроков</div>
    <div id="tops-list"></div>
  </div>
</div>

<!-- ═══ МОДАЛКА: НАСТРОЙКИ ═══ -->
<div class="modal-overlay" id="modal-settings">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('modal-settings')">✕</button>
    <div class="modal-title">⚙️ Настройки</div>
    <div class="modal-row">
      <label>До победы:</label>
      <select id="sel-score">
        <option value="3">3 гола</option>
        <option value="5" selected>5 голов</option>
        <option value="7">7 голов</option>
        <option value="10">10 голов</option>
      </select>
    </div>
    <div class="modal-row">
      <label>Сложность ИИ:</label>
      <select id="sel-diff">
        <option value="easy">Лёгкий</option>
        <option value="medium" selected>Средний</option>
        <option value="hard">Сложный</option>
      </select>
    </div>
    <button class="modal-btn" onclick="saveSettings()">💾 Сохранить</button>
  </div>
</div>

<!-- ═══ МОДАЛКА: АВТОР ═══ -->
<div class="modal-overlay" id="modal-code">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('modal-code')">✕</button>
    <div class="modal-title">👨‍💻 Автор</div>
    <div style="text-align:center;font-size:3.5vw;line-height:2.2;">
      <div>Разработчик: <b style="color:#6699ff">Тайлер</b></div>
      <div style="color:#444;font-size:2.5vw;margin-top:2vw;">v2.0 — Онлайн хоккей</div>
    </div>
  </div>
</div>

<!-- ═══ МАТЧМЕЙКИНГ ═══ -->
<div id="screen-mm" style="display:none;flex-direction:column;align-items:center;justify-content:center;">
  <div class="mm-title">Поиск игры...</div>
  <div class="mm-sub" id="mm-status">Ожидание соперника</div>
  <div class="mm-spinner"></div>
  <button class="mm-cancel" onclick="cancelMatchmaking()">✕ Отмена</button>
</div>

<!-- ═══ МАТЧ НАЙДЕН ═══ -->
<div id="screen-found" style="display:none;flex-direction:column;align-items:center;justify-content:center;">
  <div id="found-vs">⚡ МАТЧ НАЙДЕН</div>
  <div id="found-names">
    <span class="found-red"  id="found-red-name">—</span>
    <span class="found-sep">VS</span>
    <span class="found-blue" id="found-blue-name">—</span>
  </div>
</div>

<!-- ═══ ПОБЕДА ═══ -->
<div id="screen-win">
  <img id="win-img" src="" alt="">
  <div id="win-text"></div>
  <button class="btn" id="btn-restart" onclick="restartGame()">🔄 Ещё раз</button>
  <button class="btn" onclick="goMenu()">🏠 Меню</button>
</div>

<canvas id="c"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>
// ══════════════════════════════════════════════════
//  CS:GO РАНГИ — рисуем на canvas
// ══════════════════════════════════════════════════
const RANK_NAMES = [
  '',
  'Silver I','Silver II','Silver III',
  'Gold Nova I','Gold Nova II','Gold Nova III',
  'Master Guardian','Distinguished Master',
  'Supreme','Global Elite'
];

function drawRankIcon(cv, level){
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  ctx.clearRect(0,0,W,H);
  const cx = W/2, cy = H/2;

  // Цвета по уровням
  const palettes = [
    null,
    ['#888','#aaa'],  // 1 Silver I
    ['#999','#bbb'],  // 2 Silver II
    ['#aaa','#ccc'],  // 3 Silver III
    ['#c9a227','#f0c040'], // 4 Gold Nova I
    ['#c9a227','#f5d060'], // 5 Gold Nova II
    ['#c9a227','#ffd900'], // 6 Gold Nova III
    ['#4477cc','#88aaff'], // 7 Master Guardian
    ['#55aadd','#aaddff'], // 8 Distinguished
    ['#cc7733','#ffaa55'], // 9 Supreme
    ['#ddaa22','#ffffff'], // 10 Global
  ];
  const pal = palettes[level] || ['#666','#999'];
  const [col1,col2] = pal;

  // --- Уровни 1-3: Silver — полоски + звёздочки ---
  if(level<=3){
    // Щит
    ctx.beginPath();
    ctx.moveTo(cx, cy-H*0.38);
    ctx.lineTo(cx+W*0.36, cy-H*0.15);
    ctx.lineTo(cx+W*0.36, cy+H*0.15);
    ctx.lineTo(cx, cy+H*0.42);
    ctx.lineTo(cx-W*0.36, cy+H*0.15);
    ctx.lineTo(cx-W*0.36, cy-H*0.15);
    ctx.closePath();
    const gr = ctx.createLinearGradient(0,0,W,H);
    gr.addColorStop(0,col1); gr.addColorStop(1,col2);
    ctx.fillStyle=gr; ctx.fill();
    // Горизонтальные полосы
    ctx.save(); ctx.clip();
    ctx.fillStyle='rgba(255,255,255,0.15)';
    for(let i=0;i<5;i++) ctx.fillRect(0,i*(H/4)-2,W,H/8);
    ctx.restore();
    // Звёздочки снизу
    for(let i=0;i<level;i++){
      const sx = cx + (i-(level-1)/2)*(W*0.22);
      drawStar5(ctx, sx, cy+H*0.3, W*0.1, col2, 1);
    }
    return;
  }

  // --- Уровни 4-6: Gold Nova — солнце + лучи + звёзды ---
  if(level<=6){
    const stars = level-3;
    // Центральный круг
    const gr = ctx.createRadialGradient(cx,cy,0,cx,cy,W*0.3);
    gr.addColorStop(0,col2); gr.addColorStop(1,col1);
    ctx.beginPath(); ctx.arc(cx,cy-H*0.05,W*0.28,0,Math.PI*2);
    ctx.fillStyle=gr; ctx.fill();
    // Лучи
    ctx.save();
    ctx.translate(cx,cy-H*0.05);
    ctx.strokeStyle=col2; ctx.lineWidth=W*0.045;
    for(let i=0;i<8;i++){
      ctx.save(); ctx.rotate(i*Math.PI/4);
      ctx.beginPath(); ctx.moveTo(0,W*0.32); ctx.lineTo(0,W*0.43);
      ctx.stroke(); ctx.restore();
    }
    ctx.restore();
    // Звёзды
    for(let i=0;i<stars;i++){
      const sx = cx + (i-(stars-1)/2)*(W*0.26);
      drawStar5(ctx,sx,cy+H*0.35,W*0.1,col2,1);
    }
    return;
  }

  // --- Уровни 7-8: Master Guardian — орёл ---
  if(level<=8){
    drawEagle(ctx,cx,cy,W,H,col1,col2,level===8);
    if(level===7){
      drawStar5(ctx,cx,cy+H*0.36,W*0.1,col2,1);
    }
    return;
  }

  // --- Уровень 9: Supreme — орёл + корона ---
  if(level===9){
    drawEagle(ctx,cx,cy+H*0.05,W,H,col1,col2,true);
    // Корона сверху
    drawCrown(ctx,cx,cy-H*0.3,W*0.55,col2);
    return;
  }

  // --- Уровень 10: Global Elite — глобус + корона ---
  {
    const gr=ctx.createRadialGradient(cx,cy-H*0.05,0,cx,cy-H*0.05,W*0.3);
    gr.addColorStop(0,'#fff'); gr.addColorStop(0.5,col2); gr.addColorStop(1,col1);
    ctx.beginPath(); ctx.arc(cx,cy-H*0.05,W*0.3,0,Math.PI*2);
    ctx.fillStyle=gr; ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=W*0.03;
    // Меридианы
    for(let i=-1;i<=1;i++){
      ctx.beginPath(); ctx.ellipse(cx+i*W*0.1,cy-H*0.05,W*0.08,W*0.3,0,0,Math.PI*2);
      ctx.stroke();
    }
    ctx.beginPath(); ctx.arc(cx,cy-H*0.05,W*0.3,0,Math.PI*2);
    ctx.strokeStyle=col1; ctx.lineWidth=W*0.05; ctx.stroke();
    drawCrown(ctx,cx,cy+H*0.3,W*0.5,'#fff');
    return;
  }
}

function drawStar5(ctx,x,y,r,color,alpha){
  ctx.save(); ctx.globalAlpha=alpha;
  ctx.beginPath();
  for(let i=0;i<5;i++){
    const a1=i*4*Math.PI/5-Math.PI/2;
    const a2=a1+2*Math.PI/5;
    if(i===0) ctx.moveTo(x+r*Math.cos(a1),y+r*Math.sin(a1));
    else       ctx.lineTo(x+r*Math.cos(a1),y+r*Math.sin(a1));
    ctx.lineTo(x+r*0.42*Math.cos(a2),y+r*0.42*Math.sin(a2));
  }
  ctx.closePath(); ctx.fillStyle=color; ctx.fill();
  ctx.restore();
}

function drawEagle(ctx,cx,cy,W,H,col1,col2,big){
  const s = big?1.1:0.9;
  // Тело
  ctx.beginPath();
  ctx.ellipse(cx,cy,W*0.15*s,H*0.22*s,0,0,Math.PI*2);
  const gr=ctx.createLinearGradient(cx-W*0.15,cy,cx+W*0.15,cy);
  gr.addColorStop(0,col1); gr.addColorStop(1,col2);
  ctx.fillStyle=gr; ctx.fill();
  // Голова
  ctx.beginPath(); ctx.arc(cx,cy-H*0.24*s,W*0.1*s,0,Math.PI*2);
  ctx.fillStyle=col2; ctx.fill();
  // Крыло левое
  ctx.beginPath();
  ctx.moveTo(cx,cy-H*0.05*s);
  ctx.quadraticCurveTo(cx-W*0.45*s,cy-H*0.28*s,cx-W*0.44*s,cy+H*0.02*s);
  ctx.quadraticCurveTo(cx-W*0.2*s,cy+H*0.05*s,cx,cy+H*0.08*s);
  ctx.fillStyle=col1; ctx.fill();
  // Крыло правое
  ctx.beginPath();
  ctx.moveTo(cx,cy-H*0.05*s);
  ctx.quadraticCurveTo(cx+W*0.45*s,cy-H*0.28*s,cx+W*0.44*s,cy+H*0.02*s);
  ctx.quadraticCurveTo(cx+W*0.2*s,cy+H*0.05*s,cx,cy+H*0.08*s);
  ctx.fillStyle=col1; ctx.fill();
  // Клюв
  ctx.beginPath();
  ctx.moveTo(cx+W*0.1*s,cy-H*0.24*s);
  ctx.lineTo(cx+W*0.22*s,cy-H*0.28*s);
  ctx.lineTo(cx+W*0.1*s,cy-H*0.2*s);
  ctx.fillStyle='#f0c040'; ctx.fill();
}

function drawCrown(ctx,cx,cy,w,color){
  const h=w*0.5;
  ctx.beginPath();
  ctx.moveTo(cx-w/2,cy+h/2);
  ctx.lineTo(cx-w/2,cy-h*0.3);
  ctx.lineTo(cx-w*0.15,cy+h*0.1);
  ctx.lineTo(cx,cy-h/2);
  ctx.lineTo(cx+w*0.15,cy+h*0.1);
  ctx.lineTo(cx+w/2,cy-h*0.3);
  ctx.lineTo(cx+w/2,cy+h/2);
  ctx.closePath();
  ctx.fillStyle=color; ctx.fill();
}

function eloToLevel(elo){

}

//  SOCKET
// ══════════════════════════════════════════════════
function initSocket(){
  if(socket) return;
  socket=io({ transports:['websocket','polling'] });

  socket.on('queueStatus',d=>{
    document.getElementById('mm-status').textContent=`В очереди: ${d.waiting} игрок(ов)`;
  });

  socket.on('matchFound',d=>{
    mpRoomId=d.roomId; mpOpponentNick=d.opponent.nick;
    const my=playerNick, opp=d.opponent.nick;
    document.getElementById('found-red-name').textContent  = d.role==='red'?my:opp;
    document.getElementById('found-blue-name').textContent = d.role==='blue'?my:opp;
    document.getElementById('screen-found').style.display='flex';
    setTimeout(()=>{
      document.getElementById('screen-found').style.display='none';
      startGame(d.role);
    },2000);
  });

  socket.on('gameState',d=>{
    if(!running) return;
    // Шайба всегда с сервера
    puck.x=d.puck.x; puck.y=d.puck.y;
    puck.vx=d.puck.vx; puck.vy=d.puck.vy;
    if(mpRole==='red'){
      // Мы красные — обновляем синего с сервера
      blue.x=d.blue.x; blue.y=d.blue.y;
      // Себя (красного) корректируем только если не тащим
      if(dragPointerId===null){ red.x=d.red.x; red.y=d.red.y; }
    } else if(mpRole==='blue'){
      // Мы синие — обновляем красного с сервера
      red.x=d.red.x; red.y=d.red.y;
      // Себя (синего) корректируем только если не тащим
      if(dragPointerId===null){ blue.x=d.blue.x; blue.y=d.blue.y; }
    }
    sRed=d.sRed; sBlue=d.sBlue;
  });

  socket.on('goal',d=>{ sRed=d.sRed; sBlue=d.sBlue; });
  socket.on('playHit',()=>playHit());

  socket.on('matchEnd',d=>{
    running=false;
    const iWin=(mpRole==='red')?(d.winner==='red'):(d.winner==='blue');
    const delta=(mpRole==='red')?d.deltaRed:d.deltaBlue;
    playerElo=Math.max(100,playerElo+delta);
    localStorage.setItem('elo',playerElo);
    if(iWin){ statsWins++;   localStorage.setItem('wins',statsWins); }
    else     { statsLosses++; localStorage.setItem('losses',statsLosses); }
    showWinScreen(iWin,delta);
  });

  socket.on('opponentLeft',()=>{
    if(!running&&!mpRole) return;
    running=false;
    alert('⚠️ Соперник вышел');
    goMenu();
  });
}

function joinOnline(){
  initSocket();
  document.getElementById('screen-mm').style.display='flex';
  document.getElementById('mm-status').textContent='Подключение...';
  socket.emit('joinQueue',{nick:playerNick,elo:playerElo});
}

// ══════════════════════════════════════════════════
//  УПРАВЛЕНИЕ — ИСПРАВЛЕН CLAMP ДЛЯ СИНЕГО
// ══════════════════════════════════════════════════
function tb(cx,cy){ return {x:cx*BW/W, y:cy*BH/H}; }
function dst2(ax,ay,bx,by){ return Math.hypot(ax-bx,ay-by); }

let dragPointerId=null, dragOX=0, dragOY=0;
c.style.touchAction='none';

document.addEventListener('pointerdown',e=>{
  if(!running) return;
  const p=tb(e.clientX,e.clientY);
  const myPl=(mpRole==='blue')?blue:red;
  if(dragPointerId===null && dst2(p.x,p.y,myPl.x,myPl.y)<=GRAB_R){
    dragPointerId=e.pointerId;
    dragOX=p.x-myPl.x; dragOY=p.y-myPl.y;
    try{ e.target.setPointerCapture(e.pointerId); }catch(ex){}
  }
});

document.addEventListener('pointermove',e=>{
  if(!running||dragPointerId===null||e.pointerId!==dragPointerId) return;
  const p=tb(e.clientX,e.clientY);
  let nx=p.x-dragOX, ny=p.y-dragOY;

  if(mpRole==='blue'){
    // ФИКС: Clamp синего строго в ПРАВУЮ половину
    nx=Math.max(CENTER_X+blue.r, Math.min(RINK.x+RINK.w-blue.r, nx));
    ny=Math.max(RINK.y+blue.r,   Math.min(RINK.y+RINK.h-blue.r, ny));
    blue.vx=nx-blue.x; blue.vy=ny-blue.y;
    blue.x=nx; blue.y=ny;
    if(socket&&mpRoomId) socket.emit('playerMove',{roomId:mpRoomId,x:nx,y:ny});
  } else if(mpRole==='red'){
    // Clamp красного в ЛЕВУЮ половину
    nx=Math.max(RINK.x+red.r,  Math.min(CENTER_X-red.r, nx));
    ny=Math.max(RINK.y+red.r,  Math.min(RINK.y+RINK.h-red.r, ny));
    red.vx=nx-red.x; red.vy=ny-red.y;
    red.x=nx; red.y=ny;
    if(socket&&mpRoomId) socket.emit('playerMove',{roomId:mpRoomId,x:nx,y:ny});
  } else {
    // Бот режим — только красный в левой половине
    nx=Math.max(RINK.x+red.r,  Math.min(CENTER_X-red.r, nx));
    ny=Math.max(RINK.y+red.r,  Math.min(RINK.y+RINK.h-red.r, ny));
    red.vx=nx-red.x; red.vy=ny-red.y;
    red.x=nx; red.y=ny;
  }
});

document.addEventListener('pointerup',e=>{
  if(e.pointerId===dragPointerId){
    dragPointerId=null;
    if(mpRole==='blue'){ blue.vx*=0.35; blue.vy*=0.35; }
    else { red.vx*=0.35; red.vy*=0.35; }
    if(socket&&mpRoomId) socket.emit('playerRelease',{roomId:mpRoomId});
  }
});
document.addEventListener('pointercancel',e=>{ if(e.pointerId===dragPointerId) dragPointerId=null; });

// ══════════════════════════════════════════════════
//  ИИ БОТА
// ══════════════════════════════════════════════════
let aiState='defend',aiNoiseTick=0,aiNoiseX=0,aiNoiseY=0;
let aiPerceivedPuckX=BW/2,aiPerceivedPuckY=BH/2;
let aiReactionTimer=0,aiAimY=BH/2,aiPhase='position';
let _aiStuckCount=0;

function aiParams(){
  if(aiDiff==='easy') return {spd:3.5,noise:30,react:18};
  if(aiDiff==='hard') return {spd:6.0,noise:4, react:3};
  return                     {spd:4.5,noise:16,react:10};
}

function updateAI(){
  const p=aiParams();
  aiNoiseTick++;
  if(aiNoiseTick%25===0){ aiNoiseX=(Math.random()-0.5)*p.noise*2; aiNoiseY=(Math.random()-0.5)*p.noise*2; }
  aiReactionTimer++;
  if(aiReactionTimer>=p.react){ aiReactionTimer=0; aiPerceivedPuckX=puck.x+aiNoiseX; aiPerceivedPuckY=puck.y+aiNoiseY; }

  const px=aiPerceivedPuckX,py=aiPerceivedPuckY;
  const gCY=RINK.y+RINK.h/2;
  const threat=(px>BW*0.45)||(puck.vx>1.5&&px>BW*0.32);

  let tx,ty;
  if(threat){
    aiState='defend'; aiPhase='charge'; tx=px; ty=py;
    if(puck.vx>2){ tx=RINK.x+RINK.w-blue.r*2; ty=Math.max(GY+blue.r+4,Math.min(GY+GH-blue.r-4,py)); }
  } else {
    aiState='attack';
    const distToPuck=dst2(blue.x,blue.y,px,py);
    if(aiPhase==='position'||distToPuck>blue.r+puck.r+55){
      aiPhase='position';
      if(distToPuck>blue.r+puck.r+80) aiAimY=gCY+(Math.random()-0.5)*GH*0.55;
      const toGoalVX=RINK.x-px,toGoalVY=aiAimY-py;
      const toGoalL=Math.hypot(toGoalVX,toGoalVY)||1;
      tx=px-(toGoalVX/toGoalL)*(blue.r+puck.r+18);
      ty=py-(toGoalVY/toGoalL)*(blue.r+puck.r+18);
      if(distToPuck<blue.r+puck.r+52) aiPhase='charge';
    } else {
      aiPhase='charge';
      const toGoalVX=RINK.x-px,toGoalVY=aiAimY-py;
      const toGoalL=Math.hypot(toGoalVX,toGoalVY)||1;
      const nearBottom=(py>RINK.y+RINK.h-puck.r*3.5);
      const nearTop=(py<RINK.y+puck.r*3.5);
      const nearRightWall=(px>RINK.x+RINK.w-puck.r*3.5);
      if(nearBottom)      { tx=px;ty=py-(blue.r+puck.r+10); }
      else if(nearTop)    { tx=px;ty=py+(blue.r+puck.r+10); }
      else if(nearRightWall){ tx=px+(blue.r+puck.r+10);ty=py; }
      else { tx=px+(toGoalVX/toGoalL)*32;ty=py+(toGoalVY/toGoalL)*32; }
      if(distToPuck>blue.r+puck.r+55){ aiPhase='position'; tx=RINK.x+RINK.w*0.80; ty=gCY; }
    }
  }

  tx=Math.max(CENTER_X+blue.r+4,Math.min(RINK.x+RINK.w-blue.r-4,tx));
  ty=Math.max(RINK.y+blue.r+4,  Math.min(RINK.y+RINK.h-blue.r-4,ty));

  const dx=tx-blue.x,dy=ty-blue.y,dist=Math.hypot(dx,dy);
  if(dist>3){ const ac=Math.min(p.spd*0.42,dist*0.21); blue.vx+=(dx/dist)*ac; blue.vy+=(dy/dist)*ac; }
  else { blue.vx*=0.5; blue.vy*=0.5; }

  const spd=Math.hypot(blue.vx,blue.vy);
  if(spd>p.spd){ blue.vx=blue.vx/spd*p.spd; blue.vy=blue.vy/spd*p.spd; }
  if(spd<0.2&&dist>20){ blue.vx+=(dx/dist)*1.5; blue.vy+=(dy/dist)*1.5; }

  if(blue.x-CENTER_X    <blue.r+22) blue.vx+=2.2;
  if((RINK.x+RINK.w)-blue.x<blue.r+22) blue.vx-=2.2;
  if(blue.y-RINK.y      <blue.r+22) blue.vy+=2.2;
  if((RINK.y+RINK.h)-blue.y<blue.r+22) blue.vy-=2.2;

  if(spd<0.3) _aiStuckCount++; else _aiStuckCount=0;
  if(_aiStuckCount>90){
    _aiStuckCount=0; blue.x=RINK.x+RINK.w*0.78; blue.y=RINK.y+RINK.h*0.5;
    blue.vx=0; blue.vy=0; aiPhase='position';
  }
  if(Math.random()<0.0015){ blue.vx*=0.1; blue.vy*=0.1; }
}

// ══════════════════════════════════════════════════
//  ФИЗИКА (бот режим)
// ══════════════════════════════════════════════════
function clampBotPlayer(pl, isRed){
  const s=Math.hypot(pl.vx,pl.vy);
  if(s>SPMAX){ pl.vx=pl.vx/s*SPMAX; pl.vy=pl.vy/s*SPMAX; }
  if(pl.x-pl.r<RINK.x)        { pl.x=RINK.x+pl.r;       pl.vx*=-0.3; }
  if(pl.x+pl.r>RINK.x+RINK.w) { pl.x=RINK.x+RINK.w-pl.r; pl.vx*=-0.3; }
  if(pl.y-pl.r<RINK.y)        { pl.y=RINK.y+pl.r;        pl.vy*=-0.3; }
  if(pl.y+pl.r>RINK.y+RINK.h) { pl.y=RINK.y+RINK.h-pl.r; pl.vy*=-0.3; }
  if(isRed  && pl.x+pl.r>CENTER_X){ pl.x=CENTER_X-pl.r; pl.vx=0; }
  if(!isRed && pl.x-pl.r<CENTER_X){ pl.x=CENTER_X+pl.r; pl.vx=0; }
}

function movePlayerBot(pl){
  const myPl=(mpRole==='blue')?blue:red;
  if(pl===myPl&&dragPointerId!==null) return; // тащим
  pl.x+=pl.vx; pl.y+=pl.vy;
  pl.vx*=FRIC; pl.vy*=FRIC;
}

function collidePP(){
  const dx=blue.x-red.x,dy=blue.y-red.y;
  const d=Math.hypot(dx,dy),mn=red.r+blue.r;
  if(d<mn&&d>0){
    const nx=dx/d,ny=dy/d,ov=(mn-d)/2;
    red.x-=nx*ov; red.y-=ny*ov;
    blue.x+=nx*ov; blue.y+=ny*ov;
    const rel=(red.vx-blue.vx)*nx+(red.vy-blue.vy)*ny;
    if(rel>0){ red.vx-=rel*nx*0.65;red.vy-=rel*ny*0.65;blue.vx+=rel*nx*0.65;blue.vy+=rel*ny*0.65; }
  }
}

function movePuck(){
  for(const pl of [red,blue]){
    const dx=puck.x-pl.x,dy=puck.y-pl.y;
    const d=Math.hypot(dx,dy),mn=pl.r+puck.r;
    if(d<mn&&d>0){
      const nx=dx/d,ny=dy/d;
      puck.x=pl.x+nx*mn; puck.y=pl.y+ny*mn;
      const relVx=pl.vx-puck.vx,relVy=pl.vy-puck.vy;
      const impulse=(relVx*nx+relVy*ny)*2.6;
      if(impulse>0){ puck.vx+=nx*impulse; puck.vy+=ny*impulse; playHit(); }
      const ps=Math.hypot(puck.vx,puck.vy);
      if(ps<3.5){ puck.vx=nx*3.5; puck.vy=ny*3.5; }
      if(ps>18)  { puck.vx=puck.vx/ps*18; puck.vy=puck.vy/ps*18; }
    }
  }
  puck.x+=puck.vx; puck.y+=puck.vy;
  puck.vx*=0.991; puck.vy*=0.991;
  if(puck.y-puck.r<RINK.y)       { puck.y=RINK.y+puck.r;        puck.vy= Math.abs(puck.vy)*0.82; }
  if(puck.y+puck.r>RINK.y+RINK.h){ puck.y=RINK.y+RINK.h-puck.r; puck.vy=-Math.abs(puck.vy)*0.82; }
  if(puck.x-puck.r<RINK.x){
    if(puck.y+puck.r>GY&&puck.y-puck.r<GY+GH){ goal('blue'); return; }
    puck.x=RINK.x+puck.r; puck.vx=Math.abs(puck.vx)*0.82;
  }
  if(puck.x+puck.r>RINK.x+RINK.w){
    if(puck.y+puck.r>GY&&puck.y-puck.r<GY+GH){ goal('red'); return; }
    puck.x=RINK.x+RINK.w-puck.r; puck.vx=-Math.abs(puck.vx)*0.82;
  }
}

function spawnGoalStars(x,y,color){
  for(let i=0;i<14;i++){
    const angle=Math.random()*Math.PI*2,speed=2+Math.random()*5;
    starAnims.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,r:5+Math.random()*8,color,life:60,maxLife:60});
  }
}

function goal(who){
  const gx=(who==='blue')?RINK.x:RINK.x+RINK.w;
  const gy=GY+GH/2;
  if(who==='red'){
    sRed++;
    spawnGoalStars(gx,gy,'#ff4444');
    if(mpRole===null){ statsGoals++; localStorage.setItem('goals',statsGoals); }
  } else {
    sBlue++;
    spawnGoalStars(gx,gy,'#4499ff');
  }
  if(sRed>=scoreLimit||sBlue>=scoreLimit){
    running=false;
    const rw=(sRed>=scoreLimit);
    const delta=rw?Math.floor(15+Math.random()*10):-Math.floor(15+Math.random()*10);
    if(mpRole===null){
      playerElo=Math.max(100,playerElo+delta);
      localStorage.setItem('elo',playerElo);
      if(rw){ statsWins++;   localStorage.setItem('wins',statsWins); }
      else  { statsLosses++; localStorage.setItem('losses',statsLosses); }
      showWinScreen(rw,delta);
    }
  } else {
    resetPos();
  }
}

// ══════════════════════════════════════════════════
//  РИСОВАНИЕ
// ══════════════════════════════════════════════════
function clipImg(x,y,r,im){
  ctx.save(); ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.clip();
  ctx.drawImage(im,x-r,y-r,r*2,r*2); ctx.restore();
}

function drawStar(x,y,r,color,alpha){
  ctx.save(); ctx.globalAlpha=alpha; ctx.beginPath();
  for(let i=0;i<5;i++){
    const a1=i*4*Math.PI/5-Math.PI/2,a2=(i*4*Math.PI/5+2*Math.PI/5)-Math.PI/2;
    if(i===0) ctx.moveTo(x+r*Math.cos(a1),y+r*Math.sin(a1));
    else       ctx.lineTo(x+r*Math.cos(a1),y+r*Math.sin(a1));
    ctx.lineTo(x+r*0.42*Math.cos(a2),y+r*0.42*Math.sin(a2));
  }
  ctx.closePath(); ctx.fillStyle=color; ctx.fill(); ctx.restore();
}

const starScaleR=new Array(20).fill(1),starScaleB=new Array(20).fill(1);
let lastSRed=0,lastSBlue=0;

function drawStars(){
  const sz=13,gap=21,totalW=(scoreLimit-1)*gap,startX=BW/2-totalW/2;
  if(sRed>lastSRed){ starScaleR[sRed-1]=2.2; lastSRed=sRed; }
  if(sBlue>lastSBlue){ starScaleB[sBlue-1]=2.2; lastSBlue=sBlue; }
  for(let i=0;i<scoreLimit;i++){
    if(starScaleR[i]>1) starScaleR[i]+=(1-starScaleR[i])*0.1;
    if(starScaleB[i]>1) starScaleB[i]+=(1-starScaleB[i])*0.1;
  }
  for(let i=0;i<scoreLimit;i++){
    ctx.save(); ctx.translate(startX+i*gap,16); ctx.scale(starScaleR[i]<sRed+1?starScaleR[i]:1,starScaleR[i]<sRed+1?starScaleR[i]:1);
    drawStar(0,0,sz,i<sRed?'#ff4444':'rgba(255,80,80,1)',i<sRed?1:0.18); ctx.restore();
  }
  for(let i=0;i<scoreLimit;i++){
    ctx.save(); ctx.translate(startX+i*gap,BH-16); ctx.scale(starScaleB[i]<sBlue+1?starScaleB[i]:1,starScaleB[i]<sBlue+1?starScaleB[i]:1);
    drawStar(0,0,sz,i<sBlue?'#4499ff':'rgba(80,140,255,1)',i<sBlue?1:0.18); ctx.restore();
  }
}

function updateAndDrawGoalStars(){
  for(let i=starAnims.length-1;i>=0;i--){
    const s=starAnims[i];
    s.x+=s.vx; s.y+=s.vy; s.vy+=0.12;
    s.vx*=0.96; s.vy*=0.96; s.life--;
    drawStar(s.x,s.y,s.r,s.color,s.life/s.maxLife);
    if(s.life<=0) starAnims.splice(i,1);
  }
}

function drawGrabHint(){
  if(!running) return;
  const myPl=(mpRole==='blue')?blue:red;
  const col=(mpRole==='blue')?'80,140,255':'255,80,80';
  if(dragPointerId!==null){
    ctx.beginPath(); ctx.arc(myPl.x,myPl.y,myPl.r+8,0,Math.PI*2);
    ctx.strokeStyle=`rgba(${col},0.9)`; ctx.lineWidth=3.5; ctx.stroke();
  } else {
    const pulse=0.5+0.5*Math.sin(Date.now()*0.005);
    ctx.beginPath(); ctx.arc(myPl.x,myPl.y,myPl.r+5+pulse*4,0,Math.PI*2);
    ctx.strokeStyle=`rgba(${col},${0.2+pulse*0.35})`; ctx.lineWidth=2.5; ctx.stroke();
  }
}

function drawNicks(){
  if(!mpRole) return;
  ctx.font='bold 14px Arial'; ctx.textAlign='center';
  const redNick=(mpRole==='red')?playerNick:mpOpponentNick;
  const blueNick=(mpRole==='blue')?playerNick:mpOpponentNick;
  ctx.fillStyle='rgba(255,80,80,0.9)';  ctx.fillText(redNick, red.x,  red.y-red.r-6);
  ctx.fillStyle='rgba(80,140,255,0.9)'; ctx.fillText(blueNick,blue.x,blue.y-blue.r-6);
}

function draw(){
  ctx.save(); ctx.scale(sx,sy);
  ctx.drawImage(iRink,0,0,BW,BH);

  for(const pl of [red,blue]){
    ctx.beginPath(); ctx.ellipse(pl.x,pl.y+10,pl.r*0.85,pl.r*0.3,0,0,Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,0.22)'; ctx.fill();
  }

  clipImg(red.x,red.y,red.r,iRed);
  clipImg(blue.x,blue.y,blue.r,iBlue);
  drawGrabHint(); drawNicks();

  if(!mpRole&&aiState==='attack'){
    ctx.beginPath(); ctx.arc(blue.x,blue.y,blue.r+6,0,Math.PI*2);
    ctx.strokeStyle='rgba(80,140,255,0.5)'; ctx.lineWidth=2.5; ctx.stroke();
  }

  ctx.beginPath(); ctx.ellipse(puck.x,puck.y+6,puck.r*0.85,puck.r*0.32,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.28)'; ctx.fill();
  ctx.beginPath(); ctx.arc(puck.x,puck.y,puck.r,0,Math.PI*2);
  ctx.fillStyle='#111'; ctx.fill();
  ctx.strokeStyle='#555'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.beginPath(); ctx.arc(puck.x-puck.r*0.3,puck.y-puck.r*0.3,puck.r*0.25,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.12)'; ctx.fill();

  updateAndDrawGoalStars();
  drawStars();
  ctx.restore();
}

// ══════════════════════════════════════════════════
//  GAME LOOP
// ══════════════════════════════════════════════════
function loop(){
  if(!running) return;
  if(mpRole===null){
    // Бот режим
    movePlayerBot(red);
    movePlayerBot(blue);
    updateAI();
    clampBotPlayer(red,true);
    clampBotPlayer(blue,false);
    collidePP();
    movePuck();
  }
  // В мультиплеере физика на сервере, тут только рисуем
  ctx.clearRect(0,0,c.width,c.height);
  draw();
  requestAnimationFrame(loop);
}

// Fullscreen
function goFS(){
  const el=document.documentElement;
  if(el.requestFullscreen) el.requestFullscreen();
  else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  if(screen.orientation&&screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{});
}
document.addEventListener('touchstart',goFS,{once:true});
document.addEventListener('click',goFS,{once:true});

// Инициализируем музыку при первом касании
document.addEventListener('touchstart',initMenuMusic,{once:true});
document.addEventListener('click',initMenuMusic,{once:true});
</script>
